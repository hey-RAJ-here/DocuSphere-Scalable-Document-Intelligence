name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
        working-directory: rag-engine
      - name: Lint
        run: ruff check src tests
        working-directory: rag-engine
      - name: Test
        run: pytest
        working-directory: rag-engine
